name: Lock

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

concurrency:
  group: lock

jobs:
  lock:
    runs-on: ubuntu-latest
    steps:
      - uses: dessant/lock-threads@e460dfeb36e731f3aeb214be6b0c9a9d9a67eda6  # v3.0.0
        with:
          pr-inactive-days: "1"
          pr-lock-reason: ""
          exclude-any-pr-labels: keep-open
          
          issue-inactive-days: "120"
          issue-lock-reason: ""
          exclude-any-issue-labels: keep-open
